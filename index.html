<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEO Optimization Tool</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<!-- Hero Section -->

<div class="hero">

<h1>AI SEO Website Analyzer</h1>

<p class="hero-sub">
Analyze your website SEO performance, detect issues, and get optimization suggestions instantly.
</p>

<p class="hero-credit">
Created by 
<a href="https://www.linkedin.com/in/ankush-sable-6b903480/" target="_blank" class="branding-name">
Ankush Sable
</a>
| Digital Marketing & SEO Expert
</p>

</div>


<!-- Search Section -->

<div class="search-section">

<input 
type="text" 
id="urlInput" 
placeholder="Enter Website URL (Example: https://example.com)"
class="search-bar"
/>

<button id="analyzeBtn" class="analyze-btn">
Analyze Website
</button>

</div>


<!-- Tabs -->

<div class="tabs">

<button class="tab active" onclick="openTab(event,'summary')">Summary</button>
<button class="tab" onclick="openTab(event,'headers')">Headers</button>
<button class="tab" onclick="openTab(event,'images')">Images</button>
<button class="tab" onclick="openTab(event,'links')">Links</button>
<button class="tab" onclick="openTab(event,'technical')">Technical</button>

</div>


<!-- Content Sections -->

<div id="summary" class="tab-content active"></div>
<div id="headers" class="tab-content"></div>
<div id="images" class="tab-content"></div>
<div id="links" class="tab-content"></div>
<div id="technical" class="tab-content"></div>


<script src="seo-analyzer.js"></script>
<script src="script.js"></script>

<script>
document.getElementById("analyzeBtn").addEventListener("click", analyzeSEO);
</script>

</body>

</html>
